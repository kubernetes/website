# See https://cloud.google.com/cloud-build/docs/build-config

# this must be specified in seconds. If omitted, defaults to 600s (10 mins)
timeout: 9000s
# this prevents errors if you don't use both _GIT_TAG and _PULL_BASE_REF,
# or any new substitutions added in the future.
options:
  substitution_option: ALLOW_LOOSE
  machineType: 'E2_HIGHCPU_8'
steps:
    # It's fine to bump the tag to a recent version, as needed
  - name: "gcr.io/k8s-staging-test-infra/gcb-docker-gcloud@sha256:ff388e0dc16351e96f8464e2e185b74a7578a5ccb7a112cf3393468e59e6e2d2" # v20260205-38cfa9523f
    entrypoint: 'bash'
    env:
      - DOCKER_CLI_EXPERIMENTAL=enabled
      - DOCKER_BUILDKIT=1
      - TAG=$_GIT_TAG
      - BASE_REF=$_PULL_BASE_REF
    args:
      - -c
      - |
        gcloud auth configure-docker \
        && apk add sed \
        && make docker-push
substitutions:
  # _GIT_TAG will be filled with a git-based tag for the image, of the form vYYYYMMDD-hash, and
  # can be used as a substitution
  _GIT_TAG: "12345"
  # _PULL_BASE_REF will contain the ref that was pushed to to trigger this build -
  # a branch like 'main' or 'release-0.2', or a tag like 'v0.2'.
  _PULL_BASE_REF: "main"
