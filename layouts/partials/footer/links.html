<ul class="list-inline mb-0 footer-icons">
  {{ range . }}
  <li class="list-inline-item mx-2 h3" data-bs-toggle="tooltip" data-bs-placement="top" title="{{ T .name_key }}">
    <a class="text-white" target="_blank" rel="noopener" href="{{ .url }}" aria-label="{{ T .name_key }}">
      <i class="{{ .icon }}"></i>
    </a>
  </li>
  {{ end }}
</ul>
