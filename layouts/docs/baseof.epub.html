 <!--
 Base template for EPUB output. Minimal HTML shell with inline CSS only.
 No navbar, footer, scripts, or external stylesheets — e-readers can't use them.
-->

<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} | Kubernetes {{ .Site.Params.version }}</title>
  <style>
    body { font-family: serif; line-height: 1.6; margin: 1em; }
    pre, code { font-family: monospace; font-size: 0.9em; }
    pre { background: #f5f5f5; padding: 1em; overflow-x: auto; }
    img { max-width: 100%; height: auto; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ccc; padding: 0.5em; text-align: left; }
    th { background: #f0f0f0; }
    .admonition, .alert, .callout {
      border-left: 4px solid #326CE5;
      padding: 0.5em 1em;
      margin: 1em 0;
      background: #f8f9fa;
    }
    blockquote { border-left: 4px solid #ccc; margin: 1em 0; padding: 0.5em 1em; color: #555; }
    h1 {
      page-break-before: always; /* Force each top-level section to start on a new page */
      text-align: center;
      padding-top: 2em;
      margin-bottom: 1.5em;
    }
    h1:first-of-type { page-break-before: avoid; }
    .td-content { margin-bottom: 2em; }
  </style>

</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
