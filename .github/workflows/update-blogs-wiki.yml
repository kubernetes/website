update-blogs-wiki

name: Update Draft Blogs Wiki

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # daily


jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run draft blog scanner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: bash scripts/find-draft-blogs.sh