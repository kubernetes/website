<svg id="m06-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 200">
  <style>
    /* Dark theme override for #m06-svg (class-based, e.g. .dark on html/body) */
    .dark #m06-svg,
    .theme-dark #m06-svg,
    [data-bs-theme="dark"] #m06-svg,
    [data-theme="dark"] #m06-svg {
      --k8s-bg: rgba(30, 30, 30, 0.93);
      --k8s-stroke: #5b92ff;
      --k8s-stroke-dark: #0a192f;
      --k8s-mint: #00ffcc;
      --k8s-cube-purple: #a65eff;
      --k8s-arrow-color: #00ffcc;
      --k8s-arrow-line: #00ffcc;
      --k8s-arrow-width: 1.5px;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m06-svg {
      --k8s-bg: rgba(255, 255, 255, 0.8);
      --k8s-stroke: #326de6;
      --k8s-stroke-dark: #011f38;
      --k8s-mint: #06f7c9;
      --k8s-cube-purple: #8115ff;
      --k8s-arrow-color: #011f38;
      --k8s-arrow-line: #326de6;
      --k8s-arrow-width: 0.8px;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }


    #m06-svg .circle-mint-stroke {
      fill: none;
      stroke: var(--k8s-mint);
      stroke-miterlimit: 10;
      stroke-width: 2.77px;
    }

    #m06-svg .circle-mint-stroke {
      opacity: .3;
    }

    #m06-svg .cube-mint {
      fill: var(--k8s-cube-purple);
      stroke: var(--k8s-stroke-dark);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: .8px;
    }

    #m06-svg .bg-hexagon {
      fill: var(--k8s-bg);
    }

    #m06-svg .hexagon-border {
      fill: var(--k8s-stroke);
    }

    #m06-svg .arrow-opacity-group {
      opacity: .3;
    }

    #m06-svg .cube-arrow-inner {
      fill: var(--k8s-mint);
      stroke: var(--k8s-stroke-dark);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: .83px;
    }

    #m06-svg .arrow-line {
      fill: none;
      stroke: var(--k8s-arrow-line);
      stroke-miterlimit: 10;
      stroke-width: var(--k8s-arrow-width);
    }

    #m06-svg .arrow-fill {
      fill: var(--k8s-arrow-color);
    }

    /* Smooth theme transition animation for all vector elements */
    #m06-svg path,
    #m06-svg polygon,
    #m06-svg rect,
    #m06-svg circle,
    #m06-svg g,
    #m06-svg line {
      transition: fill 0.3s ease, stroke 0.3s ease, stroke-width 0.3s ease;
    }
  </style>
  <defs />

  <title>Update your application</title>

  <g id="m06-Graphics">
    <!-- Left element: mint circle and purple cube -->
    <circle class="circle-mint-stroke" cx="89.9" cy="118.5" r="28.95" />
    <path class="cube-mint" d="M76.49 110.76l13.41-7.74 13.41 7.74-13.41 7.75-13.41-7.75z" />
    <path class="cube-mint"
      d="M76.49 126.25v-15.49l13.41 7.75v15.48l-13.41-7.74zM89.9 133.99v-15.48l13.41-7.75v15.49l-13.41 7.74z" />

    <!-- Right element: hexagon background with blue border -->
    <path class="bg-hexagon" d="M229.63 167.54l-58.49-33.77V66.23l58.49-33.77 58.5 33.77v67.54l-58.5 33.77z" />
    <path class="hexagon-border"
      d="M229.63 168.46a.92.92 0 0 1-.46-.12l-58.49-33.77a.92.92 0 0 1-.46-.8V66.23a.92.92 0 0 1 .46-.8l58.49-33.77a.92.92 0 0 1 .92 0l58.49 33.77a.92.92 0 0 1 .46.8v67.54a.92.92 0 0 1-.46.8l-58.49 33.77a.92.92 0 0 1-.46.12zm-57.58-35.22l57.58 33.24 57.58-33.24V66.76l-57.58-33.24-57.57 33.24z" />

    <!-- Details inside the right element (circles and smaller cubes) -->
    <circle class="circle-mint-stroke" cx="208.95" cy="79.69" r="19.42" />
    <circle class="circle-mint-stroke" cx="253.81" cy="118.45" r="19.42" />
    <path class="cube-mint" d="M245.18 113.47l8.63-4.99 8.64 4.99-8.64 4.98-8.63-4.98z" />
    <path class="cube-mint"
      d="M245.18 123.44v-9.97l8.63 4.98v9.97l-8.63-4.98zM253.81 128.42v-9.97l8.64-4.98v9.97l-8.64 4.98z" />

    <g class="arrow-opacity-group">
      <path class="cube-arrow-inner" d="M200.32 74.7l8.63-4.98 8.64 4.98-8.64 4.99-8.63-4.99z" />
      <path class="cube-arrow-inner"
        d="M200.32 84.67V74.7l8.63 4.99v9.97l-8.63-4.99zM208.95 89.66v-9.97l8.64-4.99v9.97l-8.64 4.99z" />
    </g>

    <!-- Connecting arrow in the center (line with halo) -->
    <path class="arrow-fill" d="M214.07 122.73l-.55-.59 2.89-2.68-2.89-2.69.55-.58 3.52 3.27-3.52 3.27z" />
    <path class="arrow-line" d="M138.29 119.46h78.43" />
  </g>
</svg>
