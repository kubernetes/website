<svg id="m02-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 350 200">
  <style>
    /* Dark theme override for #m02-svg (class-based, e.g. .dark on html/body) */
    .dark #m02-svg,
    .theme-dark #m02-svg,
    [data-bs-theme="dark"] #m02-svg,
    [data-theme="dark"] #m02-svg {
      --k8s-stroke: #5b92ff;
      --k8s-stroke-dark: #0a192f;
      --k8s-grad-start: #5b92ff;
      --k8s-grad-end: #00ffcc;
      --k8s-shell: #1e1e1e;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m02-svg {
      --k8s-stroke: #326de6;
      --k8s-stroke-dark: #011f38;
      --k8s-grad-start: #326de6;
      --k8s-grad-end: #06f7c9;
      --k8s-shell: rgba(255, 255, 255, 0.8);
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m02-svg .bg-outer-opacity {
      opacity: 0.13;
    }

    #m02-svg .bg-gradient-fill {
      fill: url(#m02-linear-gradient);
    }

    #m02-svg .cube-shell,
    #m02-svg .cube-shell-thick {
      fill: var(--k8s-shell);
    }

    #m02-svg .cube-shell,
    #m02-svg .cube-shell-thick,
    #m02-svg .circle-stroke,
    #m02-svg .arrow-line {
      stroke: var(--k8s-stroke);
    }

    #m02-svg .cube-shell,
    #m02-svg .cube-shell-thick,
    #m02-svg .cube-mint,
    #m02-svg .arrow-line {
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #m02-svg .cube-shell,
    #m02-svg .circle-stroke,
    #m02-svg .cube-mint,
    #m02-svg .arrow-line {
      stroke-width: 0.8px;
    }

    #m02-svg .cube-shell-thick {
      stroke-width: 1.2px;
    }

    #m02-svg .circle-stroke,
    #m02-svg .arrow-line {
      fill: none;
    }

    #m02-svg .circle-stroke {
      stroke-miterlimit: 10;
    }


    #m02-svg .cube-mint {
      fill: var(--mint);
      stroke: var(--k8s-stroke-dark);
    }

    #m02-svg .arrow-fill {
      fill: var(--k8s-stroke);
    }

    /* Smooth theme transition animation for all vector elements */
    #m02-svg path,
    #m02-svg polygon,
    #m02-svg rect,
    #m02-svg circle,
    #m02-svg g {
      transition: fill 0.3s ease, stroke 0.3s ease;
    }
  </style>
  <defs>
    <linearGradient id="m02-linear-gradient" x1="181.65" y1="100" x2="302.12" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--k8s-grad-start)" />
      <stop offset="1" stop-color="var(--k8s-grad-end)" />
    </linearGradient>
  </defs>

  <title>Deploy an application</title>

