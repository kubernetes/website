<svg id="m04-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 200">
  <style>
    /* Dark theme override for #m04-svg (class-based, e.g. .dark on html/body) */
    .dark #m04-svg,
    .theme-dark #m04-svg,
    [data-bs-theme="dark"] #m04-svg,
    [data-theme="dark"] #m04-svg {
      --k8s-bg: rgba(30, 30, 30, 0.93);
      --k8s-stroke: #5b92ff;
      --k8s-mint: #00ffcc;
      --k8s-cube-stroke: #1e1e1e;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m04-svg {
      --k8s-bg: rgba(255, 255, 255, 0.8);
      --k8s-stroke: #326de6;
      --k8s-mint: #06f7c9;
      --k8s-cube-stroke: #ffffff;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m04-svg .bg-hexagon {
      fill: var(--k8s-bg);
    }

    #m04-svg .hexagon-border {
      fill: var(--k8s-stroke);
    }

    #m04-svg .gradient-circle {
      fill: var(--k8s-mint);
      opacity: .1;
    }

    #m04-svg .circle-dashed,
    #m04-svg .circle-stroke {
      fill: none;
      stroke: var(--k8s-mint);
      stroke-miterlimit: 10;
    }

    #m04-svg .circle-dashed {
      stroke-width: 2.4px;
      stroke-dasharray: 2.41 1.61;
    }

    #m04-svg .circle-stroke {
      stroke-width: .8px;
    }

    #m04-svg .cube-highlight {
      fill: var(--k8s-stroke);
      stroke: var(--k8s-cube-stroke);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: .91px;
    }

    /* Smooth theme transition animation for all vector elements */
    #m04-svg path,
    #m04-svg polygon,
    #m04-svg rect,
    #m04-svg circle,
    #m04-svg g {
      transition: fill 0.3s ease, stroke 0.3s ease;
    }
  </style>
