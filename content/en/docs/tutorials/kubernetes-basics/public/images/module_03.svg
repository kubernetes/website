<svg id="m03-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 200">

  <style>
    /* Dark theme override for #m03-svg (class-based, e.g. .dark on html/body) */
    .dark #m03-svg,
    .theme-dark #m03-svg,
    [data-bs-theme="dark"] #m03-svg,
    [data-theme="dark"] #m03-svg {
      --k8s-bg: rgba(30, 30, 30, 0.93);
      --k8s-stroke: #5b92ff;
      --k8s-stroke-dark: #0a192f;
      --k8s-grad-start: #5b92ff;
      --k8s-grad-end: #00ffcc;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m03-svg {
      --k8s-bg: rgba(255, 255, 255, 0.8);
      --k8s-stroke: #326de6;
      --k8s-stroke-dark: #011f38;
      --k8s-grad-start: #326de6;
      --k8s-grad-end: #06f7c9;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }


    #m03-svg .bg-hexagon {
      fill: var(--k8s-bg);
    }

    #m03-svg .hexagon-border {
      fill: var(--k8s-stroke);
    }

    #m03-svg .gradient-circle {
      opacity: .1;
      fill: url(#m03-linear-gradient);
    }

    #m03-svg .circle-stroke {
      fill: none;
      stroke: var(--k8s-stroke);
      stroke-miterlimit: 10;
      stroke-width: 1.2px;
    }

    #m03-svg .cube-mint {
      fill: var(--mint);
      stroke: var(--k8s-stroke-dark);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: .8px;
    }

    /* Smooth theme transition animation for all vector elements */
    #m03-svg path,
    #m03-svg polygon,
    #m03-svg rect,
    #m03-svg circle,
    #m03-svg g {
      transition: fill 0.3s ease, stroke 0.3s ease;
    }
  </style>
  <defs>
    <linearGradient id="m03-linear-gradient" x1="140.96" y1="100.17" x2="209.04" y2="100.17"
      gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--k8s-grad-start)" />
      <stop offset="1" stop-color="var(--k8s-grad-end)" />
    </linearGradient>
  </defs>

  <title>Explore your application</title>
  <g id="m03-Graphics">
