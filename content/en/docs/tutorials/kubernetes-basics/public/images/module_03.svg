    <path class="hexagon-border"
      d="M175 168.16a.91.91 0 0 1-.46-.12l-58.1-33.54a.91.91 0 0 1-.46-.79V66.63a.91.91 0 0 1 .46-.79l58.1-33.54a.91.91 0 0 1 .91 0l58.1 33.54a.91.91 0 0 1 .46.79v67.08a.91.91 0 0 1-.46.79L175.46 168a.91.91 0 0 1-.46.16zm-57.18-35l57.18 33 57.18-33v-66L175 34.14l-57.18 33z" />
    <circle class="gradient-circle" cx="175" cy="100.17" r="34.04" />
    <circle class="circle-stroke" cx="175" cy="100.17" r="34.13" />
    <path class="cube-mint" d="M163.14 93.32L175 86.47l11.86 6.85-11.86 6.85-11.86-6.85z" />
