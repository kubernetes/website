<svg id="m05-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 350 200">
  <style>
    /* Dark theme override for #m05-svg (class-based, e.g. .dark on html/body) */
    .dark #m05-svg,
    .theme-dark #m05-svg,
    [data-bs-theme="dark"] #m05-svg,
    [data-theme="dark"] #m05-svg {
      --k8s-bg: rgba(30, 30, 30, 0.93);
      --k8s-stroke: #5b92ff;
      --k8s-mint: #00ffcc;
      --k8s-grad-start: #5b92ff;
      --k8s-grad-end: #00ffcc;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m05-svg {
      --k8s-bg: rgba(255, 255, 255, 0.8);
      --k8s-stroke: #326de6;
      --k8s-mint: #06f7c9;
      --k8s-grad-start: #326de6;
      --k8s-grad-end: #06f7c9;
      --mint: #06f7c9;
      --yellow: #eef406;
      --orange: #f29202;
      --purple: #8115ff;
      --gray: #6d6e71;
      --corner-light-blue: #a0caea;
    }

    #m05-svg .bg-hexagon {
      fill: var(--k8s-bg);
    }

    #m05-svg .hexagon-border {
      fill: var(--k8s-stroke);
    }

    #m05-svg .gradient-circle {
      opacity: .1;
      fill: url(#m05-linear-gradient);
    }

    #m05-svg .gradient-circle {
      fill: url(#m05-linear-gradient-2);
    }

    #m05-svg .circle-stroke {
      fill: none;
      stroke: var(--k8s-stroke);
      stroke-width: 1.2px;
    }

    #m05-svg .rect-dashed {
      fill: none;
      stroke: var(--k8s-mint);
      stroke-miterlimit: 10;
      stroke-width: 2.48px;
      stroke-dasharray: 2.42 1.62;
    }

    /* Smooth theme transition animation for all vector elements */
    #m05-svg path,
    #m05-svg polygon,
    #m05-svg rect,
    #m05-svg circle,
    #m05-svg g,
    #m05-svg ellipse {
      transition: fill 0.3s ease, stroke 0.3s ease;
    }
  </style>
  <defs>
    <!-- Dynamic gradients -->
    <linearGradient id="m05-linear-gradient" x1="211.39" y1="99.89" x2="265.46" y2="99.89"
      gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--k8s-grad-start)" />
      <stop offset="1" stop-color="var(--k8s-grad-end)" />
    </linearGradient>
    <linearGradient id="m05-linear-gradient-2" x1="84.54" y1="100.11" x2="138.61" y2="100.11"
      xlink:href="#m05-linear-gradient" />
  </defs>
  <title>Scale up your application</title>
  <g id="m05-nav_bar_closed">
    <path class="bg-hexagon" d="M238.42 166.97l-58.09-33.54V66.34l58.09-33.54 58.1 33.54v67.09l-58.1 33.54z" />
    <path class="hexagon-border"
      d="M238.42 167.88a.91.91 0 0 1-.46-.12l-58.1-33.54a.91.91 0 0 1-.46-.79V66.34a.91.91 0 0 1 .46-.79L238 32a.91.91 0 0 1 .91 0L297 65.55a.91.91 0 0 1 .46.79v67.08a.91.91 0 0 1-.46.79l-58.1 33.54a.91.91 0 0 1-.48.13zm-57.18-35l57.18 33 57.18-33v-66l-57.18-33-57.18 33z" />
    <circle class="gradient-circle" cx="238.42" cy="99.89" r="27.03" />
    <circle class="circle-stroke" cx="238.42" cy="99.89" r="27.1" />
    <path class="bg-hexagon" d="M111.58 167.2l-58.1-33.54V66.57l58.1-33.54 58.09 33.54v67.09l-58.09 33.54z" />
    <path class="hexagon-border"
      d="M111.58 168.11a.91.91 0 0 1-.46-.12L53 134.45a.91.91 0 0 1-.46-.79V66.57a.91.91 0 0 1 .46-.79l58.1-33.54a.91.91 0 0 1 .91 0l58.1 33.54a.91.91 0 0 1 .46.79v67.08a.91.91 0 0 1-.46.79L112 168a.91.91 0 0 1-.42.11zm-57.18-35l57.18 33 57.18-33v-66l-57.18-33L54.4 67.1z" />
    <rect class="rect-dashed" x="71.33" y="61.02" width="205.79" height="78.99" rx="39.5" ry="39.5" />
    <circle class="gradient-circle" cx="111.58" cy="100.11" r="27.03" />
    <circle class="circle-stroke" cx="111.58" cy="100.11" r="27.1" />
  </g>
</svg>
